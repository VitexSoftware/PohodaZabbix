# Pohoda Digest — business metrics for Zabbix
# Install to /etc/zabbix/zabbix_agent2.d/pohoda-digest.conf
# Requires: pohoda-zabbix package

# Server connectivity
UserParameter=pohoda.server.connectivity,/usr/bin/php -f /usr/share/pohoda-zabbix/bin/pohoda-zabbix-status 2>/dev/null || echo "0"

# All metrics as JSON (for dependent items)
UserParameter=pohoda.digest.all,/usr/bin/php -f /usr/share/pohoda-zabbix/bin/pohoda-zabbix-digest 2>/dev/null || echo "{}"

# Debtors
UserParameter=pohoda.digest.debtors.count,/usr/bin/php -f /usr/share/pohoda-zabbix/bin/pohoda-zabbix-digest debtors.count 2>/dev/null || echo "0"
UserParameter=pohoda.digest.debtors.total_amount,/usr/bin/php -f /usr/share/pohoda-zabbix/bin/pohoda-zabbix-digest debtors.total_amount 2>/dev/null || echo "0"
UserParameter=pohoda.digest.debtors.max_overdue_days,/usr/bin/php -f /usr/share/pohoda-zabbix/bin/pohoda-zabbix-digest debtors.max_overdue_days 2>/dev/null || echo "0"

# Waiting income (unpaid outcoming invoices)
UserParameter=pohoda.digest.waiting_income.count,/usr/bin/php -f /usr/share/pohoda-zabbix/bin/pohoda-zabbix-digest waiting_income.count 2>/dev/null || echo "0"
UserParameter=pohoda.digest.waiting_income.total_amount,/usr/bin/php -f /usr/share/pohoda-zabbix/bin/pohoda-zabbix-digest waiting_income.total_amount 2>/dev/null || echo "0"

# Waiting payments (unpaid incoming invoices)
UserParameter=pohoda.digest.waiting_payments.count,/usr/bin/php -f /usr/share/pohoda-zabbix/bin/pohoda-zabbix-digest waiting_payments.count 2>/dev/null || echo "0"
UserParameter=pohoda.digest.waiting_payments.total_amount,/usr/bin/php -f /usr/share/pohoda-zabbix/bin/pohoda-zabbix-digest waiting_payments.total_amount 2>/dev/null || echo "0"

# Unmatched payments
UserParameter=pohoda.digest.unmatched_payments.count,/usr/bin/php -f /usr/share/pohoda-zabbix/bin/pohoda-zabbix-digest unmatched_payments.count 2>/dev/null || echo "0"
UserParameter=pohoda.digest.unmatched_payments.total_amount,/usr/bin/php -f /usr/share/pohoda-zabbix/bin/pohoda-zabbix-digest unmatched_payments.total_amount 2>/dev/null || echo "0"

# Invoice counts (period)
UserParameter=pohoda.digest.incoming_invoices.count,/usr/bin/php -f /usr/share/pohoda-zabbix/bin/pohoda-zabbix-digest incoming_invoices.count 2>/dev/null || echo "0"
UserParameter=pohoda.digest.outcoming_invoices.count,/usr/bin/php -f /usr/share/pohoda-zabbix/bin/pohoda-zabbix-digest outcoming_invoices.count 2>/dev/null || echo "0"

# Payment counts (period)
UserParameter=pohoda.digest.incoming_payments.count,/usr/bin/php -f /usr/share/pohoda-zabbix/bin/pohoda-zabbix-digest incoming_payments.count 2>/dev/null || echo "0"
UserParameter=pohoda.digest.outcoming_payments.count,/usr/bin/php -f /usr/share/pohoda-zabbix/bin/pohoda-zabbix-digest outcoming_payments.count 2>/dev/null || echo "0"

# Last run timestamp
UserParameter=pohoda.digest.last_run,/usr/bin/php -f /usr/share/pohoda-zabbix/bin/pohoda-zabbix-digest last_run 2>/dev/null || echo "0"
